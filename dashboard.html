<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shane's Weekly Tracker — Shared Dashboard</title>
<meta name="robots" content="noindex, nofollow" />
<meta name="description" content="Read-only shared view of weekly task status: KPI trends (completion, blocked/at-risk, velocity, carryover) and each week's report." />
<style>
  :root {
    --bg:#EEF1F7; --card:#FFFFFF; --line:#E7EAF1; --line-2:#D5DAE4;
    --ink:#151A24; --ink-2:#454F63; --mut:#8A93A6;
    --accent:#4F46E5; --accent-2:#6366F1; --accent-soft:#EEEFFE; --ring:rgba(99,102,241,0.30);
    --green:#0F8A4F; --green-bg:#E5F6EC; --amber:#9A6700; --amber-bg:#FBF1D9;
    --red:#C2362B; --red-bg:#FCEBE9; --slate:#475467; --slate-bg:#EDF0F5;
    --th-bg:#F6F7FB; --chip2-bg:#EEF2F8; --chip3-bg:#F1F4F9;
    --radius:14px;
    --shadow-sm:0 1px 2px rgba(20,28,50,0.05), 0 1px 1px rgba(20,28,50,0.04);
    --shadow:0 4px 14px -6px rgba(22,30,55,0.16), 0 2px 5px -3px rgba(22,30,55,0.10);
    --disp:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    --mono:ui-monospace,"Cascadia Code","SF Mono","Segoe UI Mono","Roboto Mono",Menlo,Consolas,monospace;
  }
  :root[data-theme="dark"] {
    --bg:#0E1117; --card:#171B22; --line:#262C36; --line-2:#333B47;
    --ink:#E7EBF2; --ink-2:#AEB6C4; --mut:#7E8796;
    --accent:#7C83FF; --accent-2:#9AA0FF; --accent-soft:#1E2340; --ring:rgba(124,131,255,0.35);
    --green:#46D08A; --green-bg:#10271C; --amber:#E6B655; --amber-bg:#2A2310;
    --red:#FF8275; --red-bg:#2C1714; --slate:#AEB6C4; --slate-bg:#222936;
    --th-bg:#1B2029; --chip2-bg:#222A36; --chip3-bg:#1E2530;
    --shadow-sm:0 1px 2px rgba(0,0,0,0.4);
    --shadow:0 6px 18px -8px rgba(0,0,0,0.6);
  }
  * { box-sizing:border-box; }
  html, body { margin:0; min-height:100%; }
  body { font-family:var(--disp); color:var(--ink); font-size:15px; line-height:1.45; -webkit-font-smoothing:antialiased;
    background:
      radial-gradient(1100px 520px at 88% -8%, rgba(99,102,241,0.10), transparent 60%),
      radial-gradient(900px 500px at -5% 10%, rgba(79,70,229,0.07), transparent 55%),
      var(--bg);
    background-attachment:fixed; }
  .wrap { max-width:1080px; margin:0 auto; padding:26px clamp(14px,3vw,32px) 64px; }

  .mast { display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:22px; }
  .brand { display:flex; align-items:center; gap:13px; }
  .brand .mark { width:42px; height:42px; border-radius:12px; flex:0 0 auto;
    background:linear-gradient(145deg, var(--accent-2), var(--accent)); color:#fff;
    display:flex; align-items:center; justify-content:center; font-weight:800; font-size:17px; letter-spacing:-0.02em;
    box-shadow:0 8px 18px -6px rgba(79,70,229,0.55); }
  .mast h1 { margin:0; font-size:21px; font-weight:800; letter-spacing:-0.02em; }
  .mast .tag { font-family:var(--mono); font-size:10.5px; letter-spacing:0.14em; text-transform:uppercase; color:var(--mut); margin-top:3px; }
  .ro { display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:11px; letter-spacing:.08em;
    text-transform:uppercase; color:var(--green); background:var(--green-bg); border-radius:999px; padding:5px 12px; }
  .btn { font-family:var(--disp); font-size:13px; font-weight:600; color:var(--ink-2); background:var(--card);
    border:1px solid var(--line-2); padding:9px 15px; border-radius:10px; cursor:pointer; box-shadow:var(--shadow-sm); transition:color .15s, border-color .15s; }
  .btn:hover { color:var(--accent); border-color:var(--accent); }

  .muted-empty { text-align:center; color:var(--mut); padding:48px 24px; background:var(--card);
    border:1px solid var(--line); border-radius:18px; max-width:480px; margin:9vh auto 0; box-shadow:var(--shadow); }
  .muted-empty h2 { margin:0 0 8px; color:var(--ink); font-size:18px; }
  .spin { display:inline-block; width:15px; height:15px; border:2px solid var(--line-2); border-top-color:var(--accent);
    border-radius:50%; animation:sp .7s linear infinite; vertical-align:-2px; } @keyframes sp { to { transform:rotate(360deg); } }

  /* KPIs */
  .kgrid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:28px; }
  .kcard { background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:18px; box-shadow:var(--shadow); }
  .kcard h3 { margin:0 0 2px; font-size:14.5px; letter-spacing:-0.01em; } .kcard .desc { margin:0 0 14px; font-size:12px; color:var(--mut); }
  .stat-row { display:flex; gap:24px; flex-wrap:wrap; margin-bottom:12px; }
  .stat .n { font-size:26px; font-weight:800; letter-spacing:-0.02em; } .stat .l { font-size:10.5px; color:var(--mut); font-family:var(--mono); letter-spacing:.05em; text-transform:uppercase; }
  svg.chart { width:100%; height:auto; display:block; }
  .legend { display:flex; gap:14px; flex-wrap:wrap; font-size:11.5px; color:var(--ink-2); margin-top:8px; }
  .legend i { display:inline-block; width:10px; height:10px; border-radius:2px; margin-right:5px; vertical-align:-1px; }
  .agelist { margin:6px 0 0; padding:0; list-style:none; }
  .agelist li { display:flex; justify-content:space-between; gap:10px; padding:6px 0; border-bottom:1px solid var(--line); font-size:13px; }
  .agelist li:last-child { border-bottom:0; }
  .agelist .wks { font-family:var(--mono); font-size:12px; color:var(--amber); white-space:nowrap; }

  /* kudos */
  .klist { display:flex; flex-direction:column; gap:12px; margin-bottom:28px; }
  .kcardk { background:var(--card); border:1px solid var(--line); border-left:3px solid var(--accent); border-radius:var(--radius); padding:14px 16px; box-shadow:var(--shadow-sm); }
  .kcardk .kmeta { font-family:var(--mono); font-size:11.5px; color:var(--mut); margin-bottom:4px; }
  .kcardk .kmeta b { color:var(--ink-2); }
  .kcardk .ktitle { font-size:15px; font-weight:700; }
  .kcardk .kdetails { font-size:13.5px; color:var(--ink-2); margin-top:4px; white-space:pre-line; }

  /* weekly reports (read-only) */
  h2.sec { font-size:16px; margin:0 0 14px; letter-spacing:-0.01em; }
  .rep { background:var(--card); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; margin-bottom:14px; box-shadow:var(--shadow-sm); }
  .rep > summary { list-style:none; cursor:pointer; padding:14px 16px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .rep > summary::-webkit-details-marker { display:none; }
  .rep > summary::before { content:"▸"; color:var(--mut); transition:transform .15s; }
  .rep[open] > summary::before { transform:rotate(90deg); }
  .rep .wk { font-weight:700; font-size:15px; } .rep .meta { font-family:var(--mono); font-size:11.5px; color:var(--mut); }
  .rep .spacer { flex:1 1 auto; }
  .badge { font-family:var(--mono); font-size:11px; font-weight:600; padding:3px 9px; border-radius:999px; }
  .badge.done { color:var(--green); background:var(--green-bg); } .badge.blk { color:var(--red); background:var(--red-bg); }
  .badge.risk { color:var(--amber); background:var(--amber-bg); } .badge.tot { color:var(--slate); background:var(--slate-bg); }
  table.tasks { width:100%; border-collapse:collapse; border-top:1px solid var(--line); }
  table.tasks th { font-family:var(--mono); font-size:10.5px; letter-spacing:.09em; text-transform:uppercase; color:var(--mut);
    text-align:left; padding:9px 16px; background:var(--th-bg); border-bottom:1px solid var(--line); }
  table.tasks td { padding:9px 16px; border-bottom:1px solid var(--line); vertical-align:top; font-size:13.5px; }
  table.tasks tr:last-child td { border-bottom:0; }
  .chip { font-size:12px; font-weight:600; padding:3px 10px; border-radius:999px; white-space:nowrap; }
  .chip.s-ontrack { color:var(--green); background:var(--green-bg); } .chip.s-atrisk { color:var(--amber); background:var(--amber-bg); }
  .chip.s-blocked { color:var(--red); background:var(--red-bg); } .chip.s-done { color:var(--slate); background:var(--slate-bg); }
  .prog-cell { font-family:var(--mono); font-size:12px; color:var(--ink-2); white-space:nowrap; }
  .col-pri { color:var(--ink-2); }
  .t-main { font-weight:600; }
  .t-tags { display:flex; gap:6px; flex-wrap:wrap; margin-top:3px; }
  .tag-proj { font-size:11px; color:var(--slate); background:var(--slate-bg); border-radius:999px; padding:2px 8px; }
  .tag-due { font-family:var(--mono); font-size:11px; color:var(--ink-2); background:var(--chip2-bg); border-radius:999px; padding:2px 8px; }
  .tag-due.od { color:var(--red); background:var(--red-bg); }
  .tag-date { font-family:var(--mono); font-size:11px; color:var(--mut); background:var(--chip3-bg); border-radius:999px; padding:2px 8px; }
  .tag-date.done { color:var(--green); background:var(--green-bg); }
  .t-note { color:var(--mut); font-size:12.5px; margin-top:4px; white-space:pre-line; }
  .t-note a, .kdetails a { color:var(--accent); text-decoration:underline; word-break:break-word; }
  .t-note ul, .t-note ol, .kdetails ul, .kdetails ol { margin:4px 0; padding-left:20px; }
  .t-items { margin:6px 0 0; padding:0; list-style:none; }
  .t-items li { font-size:12.5px; color:var(--ink-2); padding:1px 0; }
  .t-items li.hdr { font-family:var(--mono); font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:var(--mut); margin-bottom:2px; }
  .t-items li.done { color:var(--mut); text-decoration:line-through; }

  @media (max-width:720px) { .kgrid { grid-template-columns:1fr; } .col-pri, .prog-cell { display:none; } }
  @media print {
    /* even margins all round so nothing is crammed at the top or bottom */
    @page { margin:16mm; }
    :root, :root[data-theme="dark"] {
      --bg:#fff!important; --card:#fff!important; --ink:#000!important; --ink-2:#1a1a1a!important; --mut:#555!important;
      --line:#ccc!important; --line-2:#bbb!important; --th-bg:#f0f0f0!important; --accent:#000!important;
      --green:#0a6b3b!important; --amber:#7a5200!important; --red:#a52015!important; --slate:#333!important;
    }
    html, body { background:#fff !important; }
    body { background-attachment:scroll !important; }
    .wrap { max-width:none; margin:0; padding:0 !important; }
    .btn, .ro { display:none !important; } .rep > summary::before { display:none; }
    .mast { margin-bottom:12pt; }
    /* no borders/shadows around the page; keep cards intact */
    .kcard, .kcardk, .rep, .muted-empty { box-shadow:none; }
    .kcard, .kcardk, .rep, .agelist, svg.chart { break-inside:avoid; page-break-inside:avoid; }
    .kdetails, .t-note { white-space:pre-wrap !important; }
    /* each major section starts on a new page, with a little top breathing room */
    h2.sec { break-before:page; page-break-before:always; padding-top:2pt; margin-top:0; }
    h2.sec:first-of-type { break-before:auto; page-break-before:auto; }
  }
</style>

<body>
<div class="wrap">
  <header class="mast">
    <div class="brand">
      <div class="mark" aria-hidden="true">SW</div>
      <div>
        <h1 id="title">Shane's Weekly Tracker</h1>
        <div class="tag" id="subtitle">Shared dashboard</div>
      </div>
    </div>
    <div style="display:flex; gap:10px; align-items:center;">
      <span class="ro" id="roPill" hidden>● Read-only</span>
      <button class="btn" id="themeToggle" type="button" title="Toggle dark mode" aria-label="Toggle dark mode">🌙</button>
      <button class="btn" id="print" type="button" hidden>Print / PDF</button>
    </div>
  </header>

  <div id="root">
    <div class="muted-empty"><span class="spin"></span> Loading shared dashboard…</div>
  </div>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
const SUPABASE_URL = "https://hqqwlkmggwgaoiyzgrhy.supabase.co";
const SUPABASE_KEY = "sb_publishable_HmSmGVio0b9HQCBocjeuYA_eleacS3u";
const sb = createClient(SUPABASE_URL, SUPABASE_KEY, { auth: { persistSession: false } });

const COLORS = { done:"#1A8A4E", accent:"#2563EB", atrisk:"#D9A300", blocked:"#B42318" };
const $ = (id) => document.getElementById(id);
(function initTheme(){
  let theme = "light";
  try { theme = localStorage.getItem("tracker_theme") || "light"; } catch(e){}
  const apply = (t) => {
    if (t === "dark") document.documentElement.setAttribute("data-theme", "dark");
    else document.documentElement.removeAttribute("data-theme");
    $("themeToggle").textContent = (t === "dark") ? "☀️" : "🌙";
  };
  apply(theme);
  $("themeToggle").addEventListener("click", () => {
    theme = (theme === "dark") ? "light" : "dark";
    try { localStorage.setItem("tracker_theme", theme); } catch(e){}
    apply(theme);
  });
})();
// expand all weekly reports when printing, then restore
window.addEventListener("beforeprint", () => {
  document.querySelectorAll("details.rep").forEach(d => { d.dataset.wasOpen = d.open ? "1" : "0"; d.open = true; });
});
window.addEventListener("afterprint", () => {
  document.querySelectorAll("details.rep").forEach(d => { if (d.dataset.wasOpen === "0") d.open = false; });
});
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c])); }
// rich-text display: sanitize stored HTML (allowlist) or escape plain text — public page, so this is the XSS guard
function looksHtml(s){ return /<[a-z!\/][\s\S]*>/i.test(s||""); }
const RT_ALLOWED = { B:1,STRONG:1,I:1,EM:1,U:1,A:1,UL:1,OL:1,LI:1,BR:1,DIV:1,P:1,SPAN:1 };
function sanitizeHtml(html){
  const doc = new DOMParser().parseFromString("<div>"+(html||"")+"</div>", "text/html");
  const root = doc.body.firstChild;
  (function walk(node){
    Array.from(node.childNodes).forEach(child => {
      if (child.nodeType === 3) return;
      if (child.nodeType !== 1) { child.remove(); return; }
      const tag = child.tagName;
      if (tag === "SCRIPT" || tag === "STYLE") { child.remove(); return; }
      if (!RT_ALLOWED[tag]) { while (child.firstChild) node.insertBefore(child.firstChild, child); child.remove(); return; }
      Array.from(child.attributes).forEach(a => {
        const name = a.name.toLowerCase();
        if (tag === "A" && name === "href") { if (!/^(https?:|mailto:)/i.test((a.value||"").trim())) child.removeAttribute("href"); }
        else child.removeAttribute(a.name);
      });
      if (tag === "A") { child.setAttribute("target","_blank"); child.setAttribute("rel","noopener noreferrer nofollow"); }
      walk(child);
    });
  })(root);
  return root.innerHTML;
}
function richDisplay(s){ return looksHtml(s) ? sanitizeHtml(s) : esc(s).replace(/\r?\n/g,"<br>"); }
function prettyDate(iso){ if(!iso) return ""; const p=String(iso).split("-"); const d=new Date(+p[0],+p[1]-1,+p[2]);
  return d.toLocaleDateString(undefined,{ year:"numeric", month:"long", day:"numeric" }); }
function statusChipCls(s){ return s==="On Track"?"s-ontrack":s==="At Risk"?"s-atrisk":s==="Blocked"?"s-blocked":"s-done"; }
function todayIso(){ const d=new Date(); const p=n=>(n<10?"0":"")+n; return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate()); }
function shortDate(iso){ if(!iso) return ""; const p=String(iso).split("-"); const d=new Date(+p[0],+p[1]-1,+p[2]); return d.toLocaleDateString(undefined,{ month:"short", day:"numeric" }); }
function taskCell(t){
  let html = '<div class="t-main">'+esc(t.task)+'</div>';
  const tags = [];
  if (t.project && String(t.project).trim()) tags.push('<span class="tag-proj">'+esc(t.project)+'</span>');
  if (t.due_date) {
    const od = t.due_date < todayIso() && t.status !== "Done";
    tags.push('<span class="tag-due'+(od?' od':'')+'">due '+shortDate(t.due_date)+'</span>');
  }
  if (t.started_on) tags.push('<span class="tag-date">started '+shortDate(t.started_on)+'</span>');
  if (t.completed_on) tags.push('<span class="tag-date done">completed '+shortDate(t.completed_on)+'</span>');
  if (tags.length) html += '<div class="t-tags">'+tags.join("")+'</div>';
  if (t.note && String(t.note).trim()) html += '<div class="t-note">'+richDisplay(t.note)+'</div>';
  const items = Array.isArray(t.items) ? t.items : [];
  if (items.length) {
    const done = items.filter(i=>i.done).length;
    html += '<ul class="t-items"><li class="hdr">Action items · '+done+'/'+items.length+'</li>'
      + items.map(it => '<li class="'+(it.done?"done":"")+'">'+(it.done?"☑":"☐")+' '+esc(it.text)+'</li>').join("") + '</ul>';
  }
  return html;
}

function showMessage(title, body){
  $("root").innerHTML = '<div class="muted-empty"><h2>'+esc(title)+'</h2><p>'+body+'</p></div>';
}

(async function init(){
  const token = new URLSearchParams(location.search).get("s");
  if (!token) { showMessage("No dashboard link", "This page needs a share link. Ask the owner for the full URL (it ends with <b>?s=…</b>)."); return; }

  const { data, error } = await sb.rpc("shared_dashboard", { p_token: token });
  if (error) { showMessage("Couldn’t load", esc(error.message)); return; }
  if (!data) { showMessage("Link not valid", "This share link is unknown or has been revoked. Ask the owner for a fresh link."); return; }

  const prep = (data.prepared_by || "").trim();
  $("title").textContent = "Shane's Weekly Tracker";
  $("subtitle").textContent = (prep ? prep + " · " : "") + "read-only shared dashboard";
  $("roPill").hidden = false; $("print").hidden = false;
  $("print").addEventListener("click", () => window.print());

  render(data);
})();

function render(data){
  const wk = (data.weekly || []).slice();         // ascending by week_ending
  const co = (data.carryover || []).slice();
  const reports = (data.reports || []);            // descending by week_ending
  if (!wk.length) { showMessage("Nothing to show yet", "No weekly reports have been saved for this dashboard."); return; }

  const weeks = wk.map(r => String(r.week_ending||"").slice(5));
  const totalDone = wk.reduce((a,r)=>a+(+r.done||0),0);
  const totalTasks = wk.reduce((a,r)=>a+(+r.total_tasks||0),0);
  const overallRate = totalTasks ? Math.round(100*totalDone/totalTasks) : 0;
  const latest = wk[wk.length-1];
  const carryNow = co.filter(r => r.week_ending===latest.week_ending && +r.prior_weeks_seen>0 && r.status!=="Done").length;
  const aging = co.filter(r => r.status!=="Done" && +r.prior_weeks_seen>0)
                  .sort((a,b)=>b.prior_weeks_seen-a.prior_weeks_seen).slice(0,8);

  const kpis =
    '<div class="kgrid">' +
      kcard("Completion & throughput", "Tasks completed per week and % completion rate.",
        '<div class="stat-row">' + stat(overallRate+"%","overall completion") + stat(totalDone,"tasks done (all weeks)") + stat(wk.length,"weeks tracked") + '</div>' +
        barLineChart(weeks, wk.map(r=>+r.done||0), wk.map(r=>+r.completion_rate||0)) +
        legend([["Done / week",COLORS.done],["Completion %",COLORS.accent]])) +
      kcard("Blocked & at-risk trend", "Count of blocked and at-risk tasks across weeks.",
        stackedChart(weeks, wk.map(r=>+r.at_risk||0), wk.map(r=>+r.blocked||0)) +
        legend([["At risk",COLORS.atrisk],["Blocked",COLORS.blocked]])) +
      kcard("Average progress / velocity", "Mean progress % of all tasks, per week.",
        '<div class="stat-row">' + stat((latest.avg_progress||0)+"%","latest week avg") + '</div>' +
        lineChart(weeks, wk.map(r=>+r.avg_progress||0), COLORS.accent, 100)) +
      kcard("Carryover / aging", "Open tasks repeating from earlier weeks (oldest first).",
        '<div class="stat-row">' + stat(carryNow,"carried into latest week") + '</div>' + agingList(aging)) +
    '</div>';

  const kudos = (data.kudos || []);
  const kudosHtml = kudos.length
    ? '<h2 class="sec">Kudos &amp; recognition</h2><div class="klist">' + kudos.map(k =>
        '<div class="kcardk">' +
          '<div class="kmeta">' + (k.kudos_date ? shortDate(k.kudos_date) : "") +
            (k.source && k.source.trim() ? ' · <b>'+esc(k.source)+'</b>' : '') + '</div>' +
          (k.title && k.title.trim() ? '<div class="ktitle">'+esc(k.title)+'</div>' : '') +
          (k.details && k.details.trim() ? '<div class="kdetails">'+richDisplay(k.details)+'</div>' : '') +
        '</div>').join("") + '</div>'
    : '';

  const repHtml = '<h2 class="sec">Weekly reports</h2>' + reports.map((r,idx) => reportBlock(r, idx===0)).join("");

  $("root").innerHTML = kpis + kudosHtml + repHtml;
}

function reportBlock(r, open){
  const tasks = r.tasks || [];
  const done = tasks.filter(t=>t.status==="Done").length;
  const blk = tasks.filter(t=>t.status==="Blocked").length;
  const risk = tasks.filter(t=>t.status==="At Risk").length;
  const rows = tasks.length ? tasks.map(t =>
    '<tr><td>'+taskCell(t)+'</td>'
    + '<td><span class="chip '+statusChipCls(t.status)+'">'+esc(t.status)+'</span></td>'
    + '<td class="col-pri">'+esc(t.priority)+'</td>'
    + '<td class="prog-cell">'+(+t.progress||0)+'%</td></tr>').join("")
    : '<tr><td colspan="4" style="color:var(--mut)">No tasks recorded.</td></tr>';
  return '<details class="rep"'+(open?' open':'')+'>' +
    '<summary><span class="wk">'+(prettyDate(r.week_ending)||esc(r.week_ending))+'</span>' +
      '<span class="badge tot">'+tasks.length+' tasks</span>' +
      (done? '<span class="badge done">'+done+' done</span>':'') +
      (risk? '<span class="badge risk">'+risk+' at risk</span>':'') +
      (blk? '<span class="badge blk">'+blk+' blocked</span>':'') +
      '<span class="spacer"></span>' + (r.prepared_by? '<span class="meta">'+esc(r.prepared_by)+'</span>':'') +
    '</summary>' +
    '<table class="tasks"><thead><tr><th>Task</th><th>Status</th><th class="col-pri">Priority</th><th class="prog-cell">Progress</th></tr></thead>' +
    '<tbody>'+rows+'</tbody></table></details>';
}

function kcard(title, desc, inner){ return '<div class="kcard"><h3>'+title+'</h3><p class="desc">'+desc+'</p>'+inner+'</div>'; }
function stat(n,l){ return '<div class="stat"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>'; }
function legend(items){ return '<div class="legend">'+items.map(([t,c])=>'<span><i style="background:'+c+'"></i>'+t+'</span>').join("")+'</div>'; }
function agingList(rows){
  if (!rows.length) return '<p class="desc" style="margin-top:8px">No carryover — nothing repeating from earlier weeks. 🎉</p>';
  return '<ul class="agelist">'+rows.map(r =>
    '<li><span>'+esc(r.task)+' <span class="badge '+(r.status==="Blocked"?"blk":r.status==="At Risk"?"risk":"tot")+'">'+esc(r.status)+'</span></span>'
    + '<span class="wks">'+r.prior_weeks_seen+'× prior</span></li>').join("")+'</ul>';
}

// ---- inline-SVG charts (no chart library) ----
const CW=520, CH=170, PADL=30, PADB=22, PADT=12, PADR=12;
function xPos(i,n){ return PADL+(n<=1?(CW-PADL-PADR)/2:i*(CW-PADL-PADR)/(n-1)); }
function bandX(i,n){ const w=(CW-PADL-PADR)/n; return PADL+i*w+w*0.5; }
function svgOpen(){ return '<svg class="chart" viewBox="0 0 '+CW+' '+CH+'" preserveAspectRatio="xMidYMid meet">'; }
function axis(maxLabel){ return '<line x1="'+PADL+'" y1="'+(CH-PADB)+'" x2="'+(CW-PADR)+'" y2="'+(CH-PADB)+'" stroke="#E2E7EF"/>'
  + '<text x="'+(PADL-4)+'" y="'+(PADT+8)+'" font-size="9" fill="#7C889B" text-anchor="end">'+maxLabel+'</text>'; }
function xLabels(labels){ const n=labels.length; return labels.map((l,i)=>'<text x="'+xPos(i,n)+'" y="'+(CH-PADB+13)+'" font-size="9" fill="#7C889B" text-anchor="middle">'+l+'</text>').join(""); }
function yOf(v,max){ const h=CH-PADB-PADT; return CH-PADB-(max?Math.min(v,max)/max:0)*h; }
function lineChart(labels, vals, color, fixedMax){
  const max=fixedMax||Math.max(1,...vals); const n=labels.length;
  const pts=vals.map((v,i)=>xPos(i,n)+","+yOf(v,max)).join(" ");
  const dots=vals.map((v,i)=>'<circle cx="'+xPos(i,n)+'" cy="'+yOf(v,max)+'" r="3" fill="'+color+'"/>').join("");
  return svgOpen()+axis(max+(fixedMax===100?"%":""))+'<polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="2"/>'+dots+xLabels(labels)+'</svg>';
}
function barLineChart(labels, bars, line){
  const bmax=Math.max(1,...bars); const lmax=100; const n=labels.length; const bw=(CW-PADL-PADR)/n*0.5;
  const rects=bars.map((v,i)=>{ const x=bandX(i,n)-bw/2, y=yOf(v,bmax);
    return '<rect x="'+x+'" y="'+y+'" width="'+bw+'" height="'+(CH-PADB-y)+'" rx="2" fill="'+COLORS.done+'" opacity="0.85"/>'; }).join("");
  const pts=line.map((v,i)=>bandX(i,n)+","+yOf(v,lmax)).join(" ");
  const dots=line.map((v,i)=>'<circle cx="'+bandX(i,n)+'" cy="'+yOf(v,lmax)+'" r="3" fill="'+COLORS.accent+'"/>').join("");
  return svgOpen()+axis(bmax)+rects+'<polyline points="'+pts+'" fill="none" stroke="'+COLORS.accent+'" stroke-width="2"/>'+dots+xLabels(labels)+'</svg>';
}
function stackedChart(labels, risk, blocked){
  const n=labels.length; const max=Math.max(1,...labels.map((_,i)=>(risk[i]||0)+(blocked[i]||0))); const bw=(CW-PADL-PADR)/n*0.5;
  const bars=labels.map((_,i)=>{ const x=bandX(i,n)-bw/2;
    const hR=(risk[i]||0)/max*(CH-PADB-PADT); const hB=(blocked[i]||0)/max*(CH-PADB-PADT); const yB=CH-PADB-hB; const yR=yB-hR;
    return '<rect x="'+x+'" y="'+yB+'" width="'+bw+'" height="'+hB+'" fill="'+COLORS.blocked+'"/>'
         + '<rect x="'+x+'" y="'+yR+'" width="'+bw+'" height="'+hR+'" fill="'+COLORS.atrisk+'"/>'; }).join("");
  return svgOpen()+axis(max)+bars+xLabels(labels)+'</svg>';
}
</script>
