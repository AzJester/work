<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shane's Weekly Tracker — Shared Dashboard</title>
<meta name="robots" content="noindex, nofollow" />
<meta name="description" content="Read-only shared view of weekly task status: KPI trends (completion, blocked/at-risk, velocity, carryover) and each week's report." />
<style>
  :root {
    --bg:#EEF1F7; --card:#FFFFFF; --line:#E7EAF1; --line-2:#D5DAE4;
    --ink:#151A24; --ink-2:#454F63; --mut:#8A93A6;
    --accent:#4F46E5; --accent-2:#6366F1; --accent-soft:#EEEFFE; --ring:rgba(99,102,241,0.30);
    --green:#0F8A4F; --green-bg:#E5F6EC; --amber:#9A6700; --amber-bg:#FBF1D9;
    --red:#C2362B; --red-bg:#FCEBE9; --slate:#475467; --slate-bg:#EDF0F5;
    --th-bg:#F6F7FB; --chip2-bg:#EEF2F8; --chip3-bg:#F1F4F9;
    --radius:14px;
    --shadow-sm:0 1px 2px rgba(20,28,50,0.05), 0 1px 1px rgba(20,28,50,0.04);
    --shadow:0 4px 14px -6px rgba(22,30,55,0.16), 0 2px 5px -3px rgba(22,30,55,0.10);
    --disp:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,Cambria,"Times New Roman",ui-serif,serif;
    --mono:ui-monospace,"Cascadia Code","SF Mono","Segoe UI Mono","Roboto Mono",Menlo,Consolas,monospace;
  }
  :root[data-theme="dark"] {
    --bg:#0E1117; --card:#171B22; --line:#262C36; --line-2:#333B47;
    --ink:#E7EBF2; --ink-2:#AEB6C4; --mut:#7E8796;
    --accent:#7C83FF; --accent-2:#9AA0FF; --accent-soft:#1E2340; --ring:rgba(124,131,255,0.35);
    --green:#46D08A; --green-bg:#10271C; --amber:#E6B655; --amber-bg:#2A2310;
    --red:#FF8275; --red-bg:#2C1714; --slate:#AEB6C4; --slate-bg:#222936;
    --th-bg:#1B2029; --chip2-bg:#222A36; --chip3-bg:#1E2530;
    --shadow-sm:0 1px 2px rgba(0,0,0,0.4);
    --shadow:0 6px 18px -8px rgba(0,0,0,0.6);
  }
  * { box-sizing:border-box; }
  html, body { margin:0; min-height:100%; }
  body { font-family:var(--disp); color:var(--ink); font-size:15px; line-height:1.45; -webkit-font-smoothing:antialiased;
    background:
      radial-gradient(1100px 520px at 88% -8%, rgba(99,102,241,0.10), transparent 60%),
      radial-gradient(900px 500px at -5% 10%, rgba(79,70,229,0.07), transparent 55%),
      var(--bg);
    background-attachment:fixed; }
  .wrap { max-width:1080px; margin:0 auto; padding:26px clamp(14px,3vw,32px) 64px; }

  .mast { display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:22px; }
  .brand { display:flex; align-items:center; gap:13px; }
  .brand .mark { width:42px; height:42px; border-radius:12px; flex:0 0 auto;
    background:linear-gradient(145deg, var(--accent-2), var(--accent)); color:#fff;
    display:flex; align-items:center; justify-content:center; font-weight:800; font-size:17px; letter-spacing:-0.02em;
    box-shadow:0 8px 18px -6px rgba(79,70,229,0.55); }
  .brand .mark svg { width:27px; height:27px; display:block; }
  .mast h1 { margin:0; font-family:var(--serif); font-size:23px; font-weight:600; letter-spacing:0; }
  .mast .tag { font-family:var(--mono); font-size:10.5px; letter-spacing:0.14em; text-transform:uppercase; color:var(--mut); margin-top:3px; }
  .ro { display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:11px; letter-spacing:.08em;
    text-transform:uppercase; color:var(--green); background:var(--green-bg); border-radius:999px; padding:5px 12px; }
  .btn { font-family:var(--disp); font-size:13px; font-weight:600; color:var(--ink-2); background:var(--card);
    border:1px solid var(--line-2); padding:9px 15px; border-radius:10px; cursor:pointer; box-shadow:var(--shadow-sm); transition:color .15s, border-color .15s; }
  .btn:hover { color:var(--accent); border-color:var(--accent); }

  .muted-empty { text-align:center; color:var(--mut); padding:48px 24px; background:var(--card);
    border:1px solid var(--line); border-radius:18px; max-width:480px; margin:9vh auto 0; box-shadow:var(--shadow); }
  .muted-empty h2 { margin:0 0 8px; color:var(--ink); font-family:var(--serif); font-weight:600; font-size:20px; }
  .spin { display:inline-block; width:15px; height:15px; border:2px solid var(--line-2); border-top-color:var(--accent);
    border-radius:50%; animation:sp .7s linear infinite; vertical-align:-2px; } @keyframes sp { to { transform:rotate(360deg); } }

  /* exec hero — headline KPI tiles with week-over-week trend */
  .hero { position:relative; overflow:hidden; background:var(--card); border:1px solid var(--line); border-radius:18px;
    padding:24px 26px; margin-bottom:22px; box-shadow:var(--shadow); }
  .hero::before { content:""; position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg, var(--accent), var(--accent-2)); }
  .hero-head { display:flex; align-items:flex-end; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:20px; }
  .hero-k { font-family:var(--mono); font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--mut); }
  .hero-wk { font-family:var(--serif); font-size:27px; font-weight:600; letter-spacing:0; margin-top:4px; }
  .hero-by { font-size:13px; color:var(--mut); }
  .hero-by b { color:var(--ink-2); font-weight:700; }
  .etiles { display:grid; grid-template-columns:repeat(auto-fit, minmax(154px,1fr)); gap:14px; }
  .etile { background:var(--th-bg); border:1px solid var(--line); border-radius:14px; padding:15px 16px; transition:transform .15s, box-shadow .15s; }
  .etile:hover { transform:translateY(-2px); box-shadow:var(--shadow-sm); }
  .et-top { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:9px; min-height:18px; }
  .et-label { font-family:var(--mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--mut); }
  .et-num { font-family:var(--serif); font-size:34px; font-weight:600; letter-spacing:0; line-height:1; color:var(--ink); }
  .et-unit { font-family:var(--serif); font-size:18px; font-weight:600; color:var(--mut); margin-left:1px; }
  .et-sub { font-size:11.5px; color:var(--mut); margin-top:6px; }
  .etile.g .et-num { color:var(--green); } .etile.a .et-num { color:var(--amber); } .etile.r .et-num { color:var(--red); }
  .et-trend { font-family:var(--mono); font-size:10.5px; font-weight:700; display:inline-flex; align-items:center; gap:2px; padding:2px 8px; border-radius:999px; white-space:nowrap; }
  .et-trend.up { color:var(--green); background:var(--green-bg); }
  .et-trend.down { color:var(--red); background:var(--red-bg); }
  .et-trend.flat { color:var(--mut); background:var(--slate-bg); }

  /* KPIs */
  .kgrid { display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-bottom:30px; }
  .kcard { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:20px 22px; box-shadow:var(--shadow); }
  .kcard h3 { margin:0 0 2px; font-family:var(--serif); font-size:16.5px; font-weight:600; letter-spacing:0; } .kcard .desc { margin:0 0 16px; font-size:12px; color:var(--mut); }
  .stat-row { display:flex; gap:24px; flex-wrap:wrap; margin-bottom:12px; }
  .stat .n { font-family:var(--serif); font-size:28px; font-weight:600; letter-spacing:0; } .stat .l { font-size:10.5px; color:var(--mut); font-family:var(--mono); letter-spacing:.05em; text-transform:uppercase; }
  svg.chart { width:100%; height:auto; display:block; }
  svg.chart .pt { transition:r .1s; }
  svg.chart { touch-action:pan-y; }
  svg.chart .hb { fill:#000; fill-opacity:0; pointer-events:all; cursor:pointer; }
  svg.chart .hb:hover, svg.chart .hb.on { fill:var(--accent); fill-opacity:.07; }
  .chart-tip .tip-hint { display:block; margin-top:4px; padding-top:4px; border-top:1px solid rgba(255,255,255,.15); color:#9AA3B2; font-size:10.5px; }
  .rep.flash { animation:repflash 1.3s ease-out; }
  @keyframes repflash { 0%,15% { background:var(--accent-soft); } 100% { background:var(--card); } }
  svg.chart .cguide { stroke:var(--line-2); stroke-width:1; stroke-dasharray:3 3; pointer-events:none; }
  svg.chart .cfocus { pointer-events:none; }
  .chart-tip { position:fixed; z-index:60; pointer-events:none; background:#1F2937; color:#fff; font-size:11.5px;
    line-height:1.4; padding:7px 10px; border-radius:8px; box-shadow:0 6px 20px rgba(0,0,0,.28); opacity:0; transition:opacity .08s; max-width:240px; }
  .chart-tip.show { opacity:1; }
  .chart-tip b { display:block; font-weight:700; margin-bottom:2px; }
  .chart-tip span { display:flex; align-items:center; color:#D7DBE4; }
  .chart-tip i { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; flex:0 0 auto; }
  .ptoggle { display:inline-flex; align-items:center; gap:5px; font-size:12px; color:var(--ink-2); cursor:pointer; user-select:none; white-space:nowrap; }
  .ptoggle input { accent-color:var(--accent); cursor:pointer; }
  .kcard { transition:box-shadow .15s, transform .15s; }
  .kcard:hover { box-shadow:0 6px 22px rgba(0,0,0,.10); transform:translateY(-1px); }
  .exec-s[title], .stat[title] { cursor:default; }
  .stat[title]:hover .n { color:var(--accent); }
  .legend { display:flex; gap:14px; flex-wrap:wrap; font-size:11.5px; color:var(--ink-2); margin-top:8px; }
  .legend i { display:inline-block; width:10px; height:10px; border-radius:2px; margin-right:5px; vertical-align:-1px; }
  .agelist { margin:6px 0 0; padding:0; list-style:none; }
  .agelist li { display:flex; justify-content:space-between; gap:10px; padding:6px 8px; margin:0 -8px; border-radius:7px; border-bottom:1px solid var(--line); font-size:13px; transition:background .12s; }
  .agelist li:last-child { border-bottom:0; }
  .agelist li:hover { background:var(--th-bg); }
  .agelist .wks { font-family:var(--mono); font-size:12px; color:var(--amber); white-space:nowrap; }

  /* kudos */
  .klist { display:flex; flex-direction:column; gap:12px; margin-bottom:28px; }
  .kcardk { background:var(--card); border:1px solid var(--line); border-left:3px solid var(--accent); border-radius:var(--radius); padding:14px 16px; box-shadow:var(--shadow-sm); }
  .kcardk .kmeta { font-family:var(--mono); font-size:11.5px; color:var(--mut); margin-bottom:4px; }
  .kcardk .kmeta b { color:var(--ink-2); }
  .kcardk .ktitle { font-family:var(--serif); font-size:16.5px; font-weight:600; }
  .kcardk .kdetails { font-size:13.5px; color:var(--ink-2); margin-top:4px; white-space:pre-line; }

  /* weekly reports (read-only) */
  h2.sec { font-family:var(--serif); font-size:18px; font-weight:600; margin:0 0 14px; letter-spacing:0; display:flex; align-items:center; gap:9px; }
  h2.sec::before { content:""; width:4px; height:17px; border-radius:3px; background:linear-gradient(180deg, var(--accent), var(--accent-2)); flex:0 0 auto; }
  .rep { background:var(--card); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; margin-bottom:14px; box-shadow:var(--shadow-sm); }
  .rep > summary { list-style:none; cursor:pointer; padding:14px 16px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .rep > summary::-webkit-details-marker { display:none; }
  .rep > summary::before { content:"▸"; color:var(--mut); transition:transform .15s; }
  .rep[open] > summary::before { transform:rotate(90deg); }
  .rep .wk { font-family:var(--serif); font-weight:600; font-size:16.5px; } .rep .meta { font-family:var(--mono); font-size:11.5px; color:var(--mut); }
  .rep .spacer { flex:1 1 auto; }
  .badge { font-family:var(--mono); font-size:11px; font-weight:600; padding:3px 9px; border-radius:999px; }
  .badge.done { color:var(--green); background:var(--green-bg); } .badge.blk { color:var(--red); background:var(--red-bg); }
  .badge.risk { color:var(--amber); background:var(--amber-bg); } .badge.tot { color:var(--slate); background:var(--slate-bg); }
  table.tasks { width:100%; border-collapse:collapse; border-top:1px solid var(--line); }
  table.tasks th { font-family:var(--mono); font-size:10.5px; letter-spacing:.09em; text-transform:uppercase; color:var(--mut);
    text-align:left; padding:9px 16px; background:var(--th-bg); border-bottom:1px solid var(--line); }
  table.tasks td { padding:9px 16px; border-bottom:1px solid var(--line); vertical-align:top; font-size:13.5px; }
  table.tasks tr:last-child td { border-bottom:0; }
  .chip { font-size:12px; font-weight:600; padding:3px 10px; border-radius:999px; white-space:nowrap; }
  .chip.s-ontrack { color:var(--green); background:var(--green-bg); } .chip.s-atrisk { color:var(--amber); background:var(--amber-bg); }
  .chip.s-blocked { color:var(--red); background:var(--red-bg); } .chip.s-done { color:var(--slate); background:var(--slate-bg); }
  .prog-cell { font-family:var(--mono); font-size:12px; color:var(--ink-2); white-space:nowrap; }
  .col-pri { color:var(--ink-2); }
  .t-main { font-weight:600; }
  .t-tags { display:flex; gap:6px; flex-wrap:wrap; margin-top:3px; }
  .tag-proj { font-size:11px; color:var(--slate); background:var(--slate-bg); border-radius:999px; padding:2px 8px; }
  .tag-due { font-family:var(--mono); font-size:11px; color:var(--ink-2); background:var(--chip2-bg); border-radius:999px; padding:2px 8px; }
  .tag-due.od { color:var(--red); background:var(--red-bg); }
  .tag-date { font-family:var(--mono); font-size:11px; color:var(--mut); background:var(--chip3-bg); border-radius:999px; padding:2px 8px; }
  .tag-date.done { color:var(--green); background:var(--green-bg); }
  .t-note { color:var(--mut); font-size:12.5px; margin-top:4px; white-space:pre-line; }
  .t-note a, .kdetails a { color:var(--accent); text-decoration:underline; word-break:break-word; }
  .t-note ul, .t-note ol, .kdetails ul, .kdetails ol { margin:4px 0; padding-left:20px; }
  .t-items { margin:6px 0 0; padding:0; list-style:none; }
  .t-items li { font-size:12.5px; color:var(--ink-2); padding:1px 0; }
  .t-items li.hdr { font-family:var(--mono); font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:var(--mut); margin-bottom:2px; }
  .t-items li.done { color:var(--mut); text-decoration:line-through; }

  @media (max-width:720px) { .kgrid { grid-template-columns:1fr; } .col-pri, .prog-cell { display:none; } }
  @media print {
    /* even margins all round so nothing is crammed at the top or bottom */
    @page { margin:16mm; }
    :root, :root[data-theme="dark"] {
      --bg:#fff!important; --card:#fff!important; --ink:#000!important; --ink-2:#1a1a1a!important; --mut:#555!important;
      --line:#ccc!important; --line-2:#bbb!important; --th-bg:#f0f0f0!important; --accent:#000!important;
      --green:#0a6b3b!important; --amber:#7a5200!important; --red:#a52015!important; --slate:#333!important;
    }
    html, body { background:#fff !important; }
    body { background-attachment:scroll !important; }
    .wrap { max-width:none; margin:0; padding:0 !important; }
    .btn, .ro, .ptoggle { display:none !important; } .rep > summary::before { display:none; }
    /* "KPIs in PDF" toggle off → print weekly reports only */
    body.no-kpi-print #kpiSection { display:none !important; }
    .mast { margin-bottom:12pt; }
    /* no borders/shadows around the page; keep cards intact */
    .kcard, .kcardk, .rep, .muted-empty { box-shadow:none; }
    .kcard, .kcardk, .agelist, svg.chart, .hero, .etile { break-inside:avoid; page-break-inside:avoid; }
    .kdetails, .t-note { white-space:pre-wrap !important; }
    /* ---- weekly reports print like the tracker's clean report ---- */
    .rep { border:0 !important; box-shadow:none !important; }
    .rep > summary { padding:0 0 4pt !important; }
    .rep > summary .badge { background:transparent !important; padding-left:0 !important; padding-right:6pt !important; }
    /* no grid lines under tasks (match the tracker report) */
    table.tasks, table.tasks td, table.tasks th { border:0 !important; }
    table.tasks th { background:transparent !important; padding-left:0 !important; }
    table.tasks td { padding-left:0 !important; }
    /* status / tags print as colored text, not filled pills */
    .chip, .tag-proj, .tag-due, .tag-date { background:transparent !important; padding-left:0 !important; padding-right:0 !important; }
    /* keep each task (and its notes / action items) together; let a long report flow across pages */
    table.tasks tr { break-inside:avoid; page-break-inside:avoid; }
    svg.chart .hb { display:none !important; }
    /* each major section starts on a new page, with a little top breathing room */
    h2.sec { break-before:page; page-break-before:always; padding-top:2pt; margin-top:0; }
    h2.sec:first-of-type { break-before:auto; page-break-before:auto; }
  }
</style>
<script>try{if(localStorage.getItem("tracker_theme")==="dark")document.documentElement.setAttribute("data-theme","dark");}catch(e){}</script>
</head>

<div class="wrap">
  <header class="mast">
    <div class="brand">
      <div class="mark" aria-hidden="true"><svg viewBox="0 0 24 24" fill="#fff"><ellipse cx="12" cy="7.5" rx="7" ry="3"/><circle cx="12" cy="5" r="3.2"/><circle cx="7.5" cy="6.5" r="2.4"/><circle cx="16.5" cy="6.5" r="2.4"/><circle cx="9.7" cy="4.6" r="1.8"/><circle cx="14.3" cy="4.6" r="1.8"/><path d="M10 9.5q-.6 3 .4 4.5-1 1.6-.8 3.5h4.8q.2-1.9-.8-3.5 1-1.5.4-4.5z"/><ellipse cx="12" cy="18.5" rx="5.2" ry="1.7"/><circle cx="6.8" cy="18.3" r="1.1"/><circle cx="17.2" cy="18.3" r="1.1"/></svg></div>
      <div>
        <h1 id="title">Shane's Weekly Tracker</h1>
        <div class="tag" id="subtitle">Shared dashboard</div>
      </div>
    </div>
    <div style="display:flex; gap:10px; align-items:center;">
      <span class="ro" id="roPill" hidden>● Read-only</span>
      <label class="ptoggle" id="kpiToggleWrap" hidden title="Include the KPI charts in the printed PDF (off = weekly reports only)"><input type="checkbox" id="kpiPrint" checked> KPIs in PDF</label>
      <button class="btn" id="themeToggle" type="button" title="Toggle dark mode" aria-label="Toggle dark mode">🌙</button>
      <button class="btn" id="print" type="button" hidden>Print / PDF</button>
    </div>
  </header>

  <div id="root">
    <div class="muted-empty"><span class="spin"></span> Loading shared dashboard…</div>
  </div>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
const SUPABASE_URL = "https://hqqwlkmggwgaoiyzgrhy.supabase.co";
const SUPABASE_KEY = "sb_publishable_HmSmGVio0b9HQCBocjeuYA_eleacS3u";
const sb = createClient(SUPABASE_URL, SUPABASE_KEY, { auth: { persistSession: false } });

let COLORS = { done:"#1A8A4E", accent:"#2563EB", atrisk:"#D9A300", blocked:"#B42318" };
function refreshChartColors(){
  const dark = document.documentElement.getAttribute("data-theme") === "dark";
  COLORS = dark
    ? { done:"#46D08A", accent:"#9AA0FF", atrisk:"#E6B655", blocked:"#FF8275" }
    : { done:"#1A8A4E", accent:"#2563EB", atrisk:"#D9A300", blocked:"#B42318" };
}
const $ = (id) => document.getElementById(id);
(function initTheme(){
  let theme = "light";
  try { theme = localStorage.getItem("tracker_theme") || "light"; } catch(e){}
  const apply = (t) => {
    if (t === "dark") document.documentElement.setAttribute("data-theme", "dark");
    else document.documentElement.removeAttribute("data-theme");
    $("themeToggle").textContent = (t === "dark") ? "☀️" : "🌙";
  };
  apply(theme);
  $("themeToggle").addEventListener("click", () => {
    theme = (theme === "dark") ? "light" : "dark";
    try { localStorage.setItem("tracker_theme", theme); } catch(e){}
    apply(theme);
  });
})();
// expand all weekly reports when printing, then restore
window.addEventListener("beforeprint", () => {
  document.querySelectorAll("details.rep").forEach(d => { d.dataset.wasOpen = d.open ? "1" : "0"; d.open = true; });
});
window.addEventListener("afterprint", () => {
  document.querySelectorAll("details.rep").forEach(d => { if (d.dataset.wasOpen === "0") d.open = false; });
});
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c])); }
// rich-text display: sanitize stored HTML (allowlist) or escape plain text — public page, so this is the XSS guard
function looksHtml(s){ return /<[a-z!\/][\s\S]*>|&(#\d+|#x[0-9a-f]+|[a-z][a-z0-9]*);/i.test(s||""); }
function fixDoubled(s){ return String(s==null?"":s).replace(/&amp;(#?[a-z0-9]+;)/gi, "&$1"); }  // heal double-escaped entities
const RT_ALLOWED = { B:1,STRONG:1,I:1,EM:1,U:1,A:1,UL:1,OL:1,LI:1,BR:1,DIV:1,P:1,SPAN:1 };
function sanitizeHtml(html){
  const doc = new DOMParser().parseFromString("<div>"+(html||"")+"</div>", "text/html");
  const root = doc.body.firstChild;
  (function walk(node){
    Array.from(node.childNodes).forEach(child => {
      if (child.nodeType === 3) return;
      if (child.nodeType !== 1) { child.remove(); return; }
      const tag = child.tagName;
      if (tag === "SCRIPT" || tag === "STYLE") { child.remove(); return; }
      if (!RT_ALLOWED[tag]) { while (child.firstChild) node.insertBefore(child.firstChild, child); child.remove(); return; }
      Array.from(child.attributes).forEach(a => {
        const name = a.name.toLowerCase();
        if (tag === "A" && name === "href") { if (!/^(https?:|mailto:)/i.test((a.value||"").trim())) child.removeAttribute("href"); }
        else child.removeAttribute(a.name);
      });
      if (tag === "A") { child.setAttribute("target","_blank"); child.setAttribute("rel","noopener noreferrer nofollow"); }
      walk(child);
    });
  })(root);
  return root.innerHTML;
}
function richDisplay(s){ s = fixDoubled(s); return looksHtml(s) ? sanitizeHtml(s) : esc(s).replace(/\r?\n/g,"<br>"); }
function prettyDate(iso){ if(!iso) return ""; const p=String(iso).split("-"); const d=new Date(+p[0],+p[1]-1,+p[2]);
  return d.toLocaleDateString(undefined,{ year:"numeric", month:"long", day:"numeric" }); }
function statusChipCls(s){ return s==="On Track"?"s-ontrack":s==="At Risk"?"s-atrisk":s==="Blocked"?"s-blocked":"s-done"; }
function todayIso(){ const d=new Date(); const p=n=>(n<10?"0":"")+n; return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate()); }
function shortDate(iso){ if(!iso) return ""; const p=String(iso).split("-"); const d=new Date(+p[0],+p[1]-1,+p[2]); return d.toLocaleDateString(undefined,{ month:"short", day:"numeric" }); }
function taskCell(t){
  let html = '<div class="t-main">'+esc(t.task)+'</div>';
  const tags = [];
  if (t.project && String(t.project).trim()) tags.push('<span class="tag-proj">'+esc(t.project)+'</span>');
  if (t.due_date) {
    const od = t.due_date < todayIso() && t.status !== "Done";
    tags.push('<span class="tag-due'+(od?' od':'')+'">due '+shortDate(t.due_date)+'</span>');
  }
  if (t.started_on) tags.push('<span class="tag-date">started '+shortDate(t.started_on)+'</span>');
  if (t.completed_on) tags.push('<span class="tag-date done">completed '+shortDate(t.completed_on)+'</span>');
  if (tags.length) html += '<div class="t-tags">'+tags.join("")+'</div>';
  if (t.note && String(t.note).trim()) html += '<div class="t-note">'+richDisplay(t.note)+'</div>';
  const items = Array.isArray(t.items) ? t.items : [];
  if (items.length) {
    const done = items.filter(i=>i.done).length;
    html += '<ul class="t-items"><li class="hdr">Action items · '+done+'/'+items.length+'</li>'
      + items.map(it => '<li class="'+(it.done?"done":"")+'">'+(it.done?"☑":"☐")+' '+esc(it.text)+'</li>').join("") + '</ul>';
  }
  return html;
}

function showMessage(title, body){
  $("root").innerHTML = '<div class="muted-empty"><h2>'+esc(title)+'</h2><p>'+body+'</p></div>';
}

(async function init(){
  const token = new URLSearchParams(location.search).get("s");
  if (!token) { showMessage("No dashboard link", "This page needs a share link. Ask the owner for the full URL (it ends with <b>?s=…</b>)."); return; }

  const { data, error } = await sb.rpc("shared_dashboard", { p_token: token });
  if (error) { showMessage("Couldn’t load", esc(error.message)); return; }
  if (!data) { showMessage("Link not valid", "This share link is unknown or has been revoked. Ask the owner for a fresh link."); return; }

  const prep = (data.prepared_by || "").trim();
  $("title").textContent = "Shane's Weekly Tracker";
  $("subtitle").textContent = (prep ? prep + " · " : "") + "read-only shared dashboard";
  $("roPill").hidden = false; $("print").hidden = false; $("kpiToggleWrap").hidden = false;
  $("print").addEventListener("click", () => window.print());
  // print toggle: include KPI charts in the PDF or print weekly reports only (remembered per browser)
  const applyKpiPrint = (on) => document.body.classList.toggle("no-kpi-print", !on);
  let kpiPrintOn = true; try { kpiPrintOn = localStorage.getItem("dash_print_kpi") !== "0"; } catch(e){}
  $("kpiPrint").checked = kpiPrintOn; applyKpiPrint(kpiPrintOn);
  $("kpiPrint").addEventListener("change", () => {
    applyKpiPrint($("kpiPrint").checked);
    try { localStorage.setItem("dash_print_kpi", $("kpiPrint").checked ? "1" : "0"); } catch(e){}
  });

  render(data);
})();

function render(data){
  refreshChartColors();
  CHART_DATA = [];
  const wk = (data.weekly || []).slice();         // ascending by week_ending
  const co = (data.carryover || []).slice();
  const reports = (data.reports || []);            // descending by week_ending
  if (!wk.length) { showMessage("Nothing to show yet", "No weekly reports have been saved for this dashboard."); return; }

  const weeks = wk.map(r => String(r.week_ending||"").slice(5));
  const totalDone = wk.reduce((a,r)=>a+(+r.done||0),0);
  const totalTasks = wk.reduce((a,r)=>a+(+r.total_tasks||0),0);
  const overallRate = totalTasks ? Math.round(100*totalDone/totalTasks) : 0;
  const latest = wk[wk.length-1];
  const carryNow = co.filter(r => r.week_ending===latest.week_ending && +r.prior_weeks_seen>0 && r.status!=="Done").length;
  const aging = co.filter(r => r.status!=="Done" && +r.prior_weeks_seen>0)
                  .sort((a,b)=>b.prior_weeks_seen-a.prior_weeks_seen).slice(0,8);

  const wkLabel = (r) => prettyDate(r.week_ending) || String(r.week_ending||"");
  const tipCompletion = wk.map(r => ({ label: wkLabel(r), week: r.week_ending,
    lines: [ {t:(+r.done||0)+" of "+(+r.total_tasks||0)+" tasks done", c:COLORS.done}, {t:(+r.completion_rate||0)+"% completion", c:COLORS.accent} ] }));
  const tipTrend = wk.map(r => ({ label: wkLabel(r), week: r.week_ending,
    lines: [ {t:(+r.at_risk||0)+" at risk", c:COLORS.atrisk}, {t:(+r.blocked||0)+" blocked", c:COLORS.blocked} ] }));
  const tipProgress = wk.map(r => ({ label: wkLabel(r), week: r.week_ending,
    lines: [ {t:(+r.avg_progress||0)+"% average progress", c:COLORS.accent} ] }));

  const kpis =
    '<div class="kgrid">' +
      kcard("Completion & throughput", "Tasks completed per week and % completion rate.",
        '<div class="stat-row">' + stat(overallRate+"%","overall completion","Tasks Done ÷ total tasks across all weeks") + stat(totalDone,"tasks done (all weeks)","Total tasks marked Done across every week") + stat(wk.length,"weeks tracked","Number of weeks with a saved report") + '</div>' +
        barLineChart(weeks, wk.map(r=>+r.done||0), wk.map(r=>+r.completion_rate||0), tipCompletion) +
        legend([["Done / week",COLORS.done],["Completion %",COLORS.accent]])) +
      kcard("Blocked & at-risk trend", "Count of blocked and at-risk tasks across weeks.",
        stackedChart(weeks, wk.map(r=>+r.at_risk||0), wk.map(r=>+r.blocked||0), tipTrend) +
        legend([["At risk",COLORS.atrisk],["Blocked",COLORS.blocked]])) +
      kcard("Average progress / velocity", "Mean progress % of all tasks, per week.",
        '<div class="stat-row">' + stat((latest.avg_progress||0)+"%","latest week avg","Average progress across the latest week's tasks") + '</div>' +
        lineChart(weeks, wk.map(r=>+r.avg_progress||0), COLORS.accent, 100, tipProgress)) +
      kcard("Carryover / aging", "Open tasks repeating from earlier weeks (oldest first).",
        '<div class="stat-row">' + stat(carryNow,"carried into latest week","Open tasks in the latest week that also appeared in an earlier week") + '</div>' + agingList(aging)) +
    '</div>';

  const kudos = (data.kudos || []);
  const kudosHtml = kudos.length
    ? '<h2 class="sec">Kudos &amp; recognition</h2><div class="klist">' + kudos.map(k =>
        '<div class="kcardk">' +
          '<div class="kmeta">' + (k.kudos_date ? shortDate(k.kudos_date) : "") +
            (k.source && k.source.trim() ? ' · <b>'+esc(k.source)+'</b>' : '') + '</div>' +
          (k.title && k.title.trim() ? '<div class="ktitle">'+esc(k.title)+'</div>' : '') +
          (k.details && k.details.trim() ? '<div class="kdetails">'+richDisplay(k.details)+'</div>' : '') +
        '</div>').join("") + '</div>'
    : '';

  // exec hero — latest week at a glance, with week-over-week trend
  const lw = latest;
  const lwRate = +lw.completion_rate || 0;
  const prev = wk.length > 1 ? wk[wk.length-2] : null;
  const num = (v) => (+v || 0);
  const prepBy = (data.prepared_by || "").trim();
  const execHtml =
    '<div class="hero">' +
      '<div class="hero-head">' +
        '<div><div class="hero-k">Latest · week ending</div><div class="hero-wk">'+(prettyDate(lw.week_ending)||esc(lw.week_ending))+'</div></div>' +
        (prepBy ? '<div class="hero-by">Prepared by <b>'+esc(prepBy)+'</b></div>' : '') +
      '</div>' +
      '<div class="etiles">' +
        eTile("Completion", lwRate, "%", num(lw.done)+" of "+num(lw.total_tasks)+" done", "g",
              trendHtml(lwRate, prev && prev.completion_rate, { pct:true })) +
        eTile("Avg progress", num(lw.avg_progress), "%", "across the week", "",
              trendHtml(num(lw.avg_progress), prev && prev.avg_progress, { pct:true })) +
        eTile("At risk", num(lw.at_risk), "", num(lw.at_risk)===1?"task":"tasks", (lw.at_risk?"a":""),
              trendHtml(num(lw.at_risk), prev && prev.at_risk, { higherBetter:false })) +
        eTile("Blocked", num(lw.blocked), "", num(lw.blocked)===1?"task":"tasks", (lw.blocked?"r":""),
              trendHtml(num(lw.blocked), prev && prev.blocked, { higherBetter:false })) +
        eTile("Total tasks", num(lw.total_tasks), "", "this week", "",
              trendHtml(num(lw.total_tasks), prev && prev.total_tasks, { neutral:true })) +
        eTile("Weeks tracked", wk.length, "", wk.length===1?"week":"weeks", "", "") +
      '</div>' +
    '</div>';

  const repHtml = '<h2 class="sec">Weekly reports</h2>' + reports.map((r,idx) => reportBlock(r, idx===0)).join("");

  $("root").innerHTML = execHtml + '<section id="kpiSection">' + kpis + '</section>' + kudosHtml + repHtml;
  wireCharts();
}
function eTile(label, num, unit, sub, tone, trend){
  return '<div class="etile '+(tone||"")+'">'
    + '<div class="et-top"><span class="et-label">'+esc(label)+'</span>'+(trend||"")+'</div>'
    + '<div class="et-num">'+num+(unit?'<span class="et-unit">'+unit+'</span>':"")+'</div>'
    + (sub?'<div class="et-sub">'+esc(sub)+'</div>':"")
    + '</div>';
}
// week-over-week trend pill; prev=null (no prior week) → nothing
function trendHtml(cur, prev, opts){
  opts = opts || {};
  if (prev === null || prev === undefined) return "";
  const d = (+cur||0) - (+prev||0);
  if (d === 0) return '<span class="et-trend flat" title="No change vs. previous week">— 0'+(opts.pct?"%":"")+'</span>';
  const higherBetter = opts.higherBetter !== false;
  const cls = opts.neutral ? "flat" : ((d>0)===higherBetter ? "up" : "down");
  const arrow = d>0 ? "▲" : "▼";
  const val = Math.abs(d) + (opts.pct ? "%" : "");
  return '<span class="et-trend '+cls+'" title="vs. previous week">'+arrow+' '+val+'</span>';
}
function execStat(n, l, tone, tip){ return '<div class="exec-s '+(tone||"")+'"'+(tip?' title="'+esc(tip)+'"':'')+'><div class="exec-n">'+n+'</div><div class="exec-sl">'+l+'</div></div>'; }

function reportBlock(r, open){
  const tasks = r.tasks || [];
  const done = tasks.filter(t=>t.status==="Done").length;
  const blk = tasks.filter(t=>t.status==="Blocked").length;
  const risk = tasks.filter(t=>t.status==="At Risk").length;
  const rows = tasks.length ? tasks.map(t =>
    '<tr><td>'+taskCell(t)+'</td>'
    + '<td><span class="chip '+statusChipCls(t.status)+'">'+esc(t.status)+'</span></td>'
    + '<td class="col-pri">'+esc(t.priority)+'</td>'
    + '<td class="prog-cell">'+(+t.progress||0)+'%</td></tr>').join("")
    : '<tr><td colspan="4" style="color:var(--mut)">No tasks recorded.</td></tr>';
  return '<details class="rep" id="rep-'+esc(r.week_ending)+'"'+(open?' open':'')+'>' +
    '<summary><span class="wk">'+(prettyDate(r.week_ending)||esc(r.week_ending))+'</span>' +
      '<span class="badge tot">'+tasks.length+' tasks</span>' +
      (done? '<span class="badge done">'+done+' done</span>':'') +
      (risk? '<span class="badge risk">'+risk+' at risk</span>':'') +
      (blk? '<span class="badge blk">'+blk+' blocked</span>':'') +
      '<span class="spacer"></span>' + (r.prepared_by? '<span class="meta">'+esc(r.prepared_by)+'</span>':'') +
    '</summary>' +
    '<table class="tasks"><thead><tr><th>Task</th><th>Status</th><th class="col-pri">Priority</th><th class="prog-cell">Progress</th></tr></thead>' +
    '<tbody>'+rows+'</tbody></table></details>';
}

function kcard(title, desc, inner){ return '<div class="kcard"><h3>'+title+'</h3><p class="desc">'+desc+'</p>'+inner+'</div>'; }
function stat(n,l,tip){ return '<div class="stat"'+(tip?' title="'+esc(tip)+'"':'')+'><div class="n">'+n+'</div><div class="l">'+l+'</div></div>'; }
function legend(items){ return '<div class="legend">'+items.map(([t,c])=>'<span><i style="background:'+c+'"></i>'+t+'</span>').join("")+'</div>'; }
function agingList(rows){
  if (!rows.length) return '<p class="desc" style="margin-top:8px">No carryover — nothing repeating from earlier weeks. 🎉</p>';
  return '<ul class="agelist">'+rows.map(r =>
    '<li><span>'+esc(r.task)+' <span class="badge '+(r.status==="Blocked"?"blk":r.status==="At Risk"?"risk":"tot")+'">'+esc(r.status)+'</span></span>'
    + '<span class="wks">'+r.prior_weeks_seen+'× prior</span></li>').join("")+'</ul>';
}

// ---- inline-SVG charts (no chart library) ----
const CW=520, CH=170, PADL=30, PADB=22, PADT=12, PADR=12;
function xPos(i,n){ return PADL+(n<=1?(CW-PADL-PADR)/2:i*(CW-PADL-PADR)/(n-1)); }
function bandX(i,n){ const w=(CW-PADL-PADR)/n; return PADL+i*w+w*0.5; }
// ---- interactive tooltips: register per-week values, draw transparent hover columns ----
let CHART_DATA = [];
function regChart(rows, xs, series){ const c = CHART_DATA.length; CHART_DATA.push({ rows: rows||[], xs: xs||[], series: series||[] }); return c; }
function hoverBands(c, n){
  const full = CW-PADL-PADR, w = full/n; let out = "";
  for (let i=0;i<n;i++) out += '<rect class="hb" data-c="'+c+'" data-i="'+i+'" x="'+(PADL+i*w)+'" y="'+PADT+'" width="'+w+'" height="'+(CH-PADB-PADT)+'"></rect>';
  return out;
}
// hover columns centered on arbitrary point x-positions (line charts use xPos spacing, not even bands)
function hoverBandsAt(c, xs){
  const n = xs.length; let out = "";
  for (let i=0;i<n;i++){
    const left = i===0 ? PADL : (xs[i-1]+xs[i])/2;
    const right = i===n-1 ? (CW-PADR) : (xs[i]+xs[i+1])/2;
    out += '<rect class="hb" data-c="'+c+'" data-i="'+i+'" x="'+left+'" y="'+PADT+'" width="'+(right-left)+'" height="'+(CH-PADB-PADT)+'"></rect>';
  }
  return out;
}
// crosshair guide + per-series focus markers, positioned on hover
function cguide(){ return '<line class="cguide" x1="0" x2="0" y1="'+PADT+'" y2="'+(CH-PADB)+'" style="display:none"></line>'; }
function cfocus(series){ return (series||[]).map(s => '<circle class="cfocus" r="5" fill="'+s.color+'" stroke="#fff" stroke-width="1.5" style="display:none"></circle>').join(""); }
function chartTip(){ let t=document.getElementById("chartTip"); if(!t){ t=document.createElement("div"); t.id="chartTip"; t.className="chart-tip"; document.body.appendChild(t); } return t; }
function moveTip(e){
  const t=chartTip(), pad=14, w=t.offsetWidth, h=t.offsetHeight;
  let x=e.clientX+pad, y=e.clientY+pad;
  if (x+w > window.innerWidth-8) x = e.clientX-w-pad;
  if (y+h > window.innerHeight-8) y = e.clientY-h-pad;
  t.style.left=x+"px"; t.style.top=y+"px";
}
function tipLine(l){ return (typeof l === "string")
  ? '<span>'+esc(l)+'</span>'
  : '<span><i style="background:'+(l.c||"#888")+'"></i>'+esc(l.t)+'</span>'; }
function wireCharts(){
  const t=chartTip();
  document.querySelectorAll("svg.chart").forEach(svg => {
    const firstHb = svg.querySelector(".hb"); if (!firstHb) return;
    const data = CHART_DATA[+firstHb.dataset.c]; if (!data || !data.xs.length) return;
    const idxAt = (clientX) => {
      const r = svg.getBoundingClientRect(); if (!r.width) return 0;
      const lx = (clientX - r.left) / r.width * CW;   // client px -> viewBox x
      let best=0, bd=Infinity;
      data.xs.forEach((x,i) => { const d=Math.abs(x-lx); if (d<bd){ bd=d; best=i; } });
      return best;
    };
    const show = (e) => {
      const i = idxAt(e.clientX); const row = data.rows[i]; if (!row) return;
      const canDrill = row.week && document.getElementById("rep-"+row.week);
      t.innerHTML = '<b>'+esc(row.label)+'</b>' + (row.lines||[]).map(tipLine).join("")
        + (canDrill ? '<span class="tip-hint">Click to open this week’s report</span>' : "");
      t.classList.add("show"); moveTip(e);
      const g = svg.querySelector(".cguide");
      if (g && data.xs[i] != null) { g.setAttribute("x1", data.xs[i]); g.setAttribute("x2", data.xs[i]); g.style.display=""; }
      svg.querySelectorAll(".cfocus").forEach((f, si) => {
        const s = data.series[si];
        if (s && s.cy[i] != null) { f.setAttribute("cx", data.xs[i]); f.setAttribute("cy", s.cy[i]); f.style.display=""; }
        else f.style.display = "none";
      });
      svg.querySelectorAll(".hb").forEach((b, bi) => b.classList.toggle("on", bi===i));
    };
    const hide = () => {
      t.classList.remove("show");
      const g = svg.querySelector(".cguide"); if (g) g.style.display="none";
      svg.querySelectorAll(".cfocus").forEach(f => f.style.display="none");
      svg.querySelectorAll(".hb").forEach(b => b.classList.remove("on"));
    };
    // click/tap a column to drill down to that week's full report
    const drill = (e) => {
      const i = idxAt(e.clientX); const row = data.rows[i]; if (!row || !row.week) return;
      const rep = document.getElementById("rep-"+row.week); if (!rep) return;
      rep.open = true;
      rep.scrollIntoView({ behavior:"smooth", block:"start" });
      rep.classList.add("flash"); setTimeout(() => rep.classList.remove("flash"), 1300);
      hide();
    };
    // pointer events cover mouse, touch and pen (mouseenter/move don't fire on touch)
    svg.addEventListener("pointerenter", show);
    svg.addEventListener("pointermove", show);
    svg.addEventListener("pointerdown", show);
    svg.addEventListener("pointerleave", hide);
    svg.addEventListener("pointercancel", hide);
    svg.addEventListener("click", drill);
  });
}
function svgOpen(){ return '<svg class="chart" viewBox="0 0 '+CW+' '+CH+'" preserveAspectRatio="xMidYMid meet">'; }
function axis(maxLabel){ return '<line x1="'+PADL+'" y1="'+(CH-PADB)+'" x2="'+(CW-PADR)+'" y2="'+(CH-PADB)+'" stroke="#E2E7EF"/>'
  + '<text x="'+(PADL-4)+'" y="'+(PADT+8)+'" font-size="9" fill="#7C889B" text-anchor="end">'+maxLabel+'</text>'; }
function xLabels(labels){ const n=labels.length; return labels.map((l,i)=>'<text x="'+xPos(i,n)+'" y="'+(CH-PADB+13)+'" font-size="9" fill="#7C889B" text-anchor="middle">'+l+'</text>').join(""); }
function yOf(v,max){ const h=CH-PADB-PADT; return CH-PADB-(max?Math.min(v,max)/max:0)*h; }
function lineChart(labels, vals, color, fixedMax, tipRows){
  const max=fixedMax||Math.max(1,...vals); const n=labels.length;
  const xs=vals.map((v,i)=>xPos(i,n)); const cy=vals.map(v=>yOf(v,max));
  const pts=xs.map((x,i)=>x+","+cy[i]).join(" ");
  const dots=xs.map((x,i)=>'<circle class="pt" cx="'+x+'" cy="'+cy[i]+'" r="3" fill="'+color+'"/>').join("");
  const series=[{cy, color}];
  const c=regChart(tipRows, xs, series);
  return svgOpen()+axis(max+(fixedMax===100?"%":""))+'<polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="2"/>'+dots+cguide()+cfocus(series)+xLabels(labels)+hoverBandsAt(c,xs)+'</svg>';
}
function barLineChart(labels, bars, line, tipRows){
  const bmax=Math.max(1,...bars); const lmax=100; const n=labels.length; const bw=(CW-PADL-PADR)/n*0.5;
  const xs=bars.map((v,i)=>bandX(i,n));
  const rects=bars.map((v,i)=>{ const x=xs[i]-bw/2, y=yOf(v,bmax);
    return '<rect x="'+x+'" y="'+y+'" width="'+bw+'" height="'+(CH-PADB-y)+'" rx="2" fill="'+COLORS.done+'" opacity="0.85"/>'; }).join("");
  const cyL=line.map(v=>yOf(v,lmax));
  const pts=xs.map((x,i)=>x+","+cyL[i]).join(" ");
  const dots=xs.map((x,i)=>'<circle class="pt" cx="'+x+'" cy="'+cyL[i]+'" r="3" fill="'+COLORS.accent+'"/>').join("");
  const series=[{cy:cyL, color:COLORS.accent}];
  const c=regChart(tipRows, xs, series);
  return svgOpen()+axis(bmax)+rects+'<polyline points="'+pts+'" fill="none" stroke="'+COLORS.accent+'" stroke-width="2"/>'+dots+cguide()+cfocus(series)+xLabels(labels)+hoverBands(c,n)+'</svg>';
}
function stackedChart(labels, risk, blocked, tipRows){
  const n=labels.length; const max=Math.max(1,...labels.map((_,i)=>(risk[i]||0)+(blocked[i]||0))); const bw=(CW-PADL-PADR)/n*0.5;
  const xs=labels.map((_,i)=>bandX(i,n));
  const bars=labels.map((_,i)=>{ const x=xs[i]-bw/2;
    const hR=(risk[i]||0)/max*(CH-PADB-PADT); const hB=(blocked[i]||0)/max*(CH-PADB-PADT); const yB=CH-PADB-hB; const yR=yB-hR;
    return '<rect x="'+x+'" y="'+yB+'" width="'+bw+'" height="'+hB+'" fill="'+COLORS.blocked+'"/>'
         + '<rect x="'+x+'" y="'+yR+'" width="'+bw+'" height="'+hR+'" fill="'+COLORS.atrisk+'"/>'; }).join("");
  const c=regChart(tipRows, xs, []);
  return svgOpen()+axis(max)+bars+cguide()+xLabels(labels)+hoverBands(c,n)+'</svg>';
}
</script>
