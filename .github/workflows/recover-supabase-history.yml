name: Recover Supabase migration history

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  recover:
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: hqqwlkmggwgaoiyzgrhy
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check recovery credentials
        shell: bash
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN and SUPABASE_DB_PASSWORD are required."
            exit 1
          fi

      - name: Install pinned Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.101.0

      - name: Link production database
        shell: bash
        run: |
          supabase init --force
          supabase link --project-ref "$PROJECT_ID"

      - name: Fetch stored migration statements
        shell: bash
        run: |
          cp supabase/migrations/20260711060000_tracker_hardening.sql \
            "$RUNNER_TEMP/20260711060000_tracker_hardening.sql"
          supabase migration fetch --linked --yes
          cp "$RUNNER_TEMP/20260711060000_tracker_hardening.sql" \
            supabase/migrations/20260711060000_tracker_hardening.sql

      - name: Verify recovered history
        shell: bash
        run: |
          expected=(
            20260623030901
            20260623030919
            20260623033204
            20260623114530
            20260623114957
            20260623115339
            20260623115531
            20260623140138
            20260623141807
            20260623165738
            20260624023255
            20260624204121
            20260624204134
            20260710211311
          )

          for version in "${expected[@]}"; do
            matches=(supabase/migrations/"${version}"_*.sql)
            if [ "${#matches[@]}" -ne 1 ] || [ ! -f "${matches[0]}" ]; then
              echo "::error::Expected exactly one recovered migration for ${version}."
              exit 1
            fi
            if [ -z "$(tr -d '[:space:];' < "${matches[0]}")" ]; then
              echo "::error::Recovered migration ${version} has no stored SQL statements."
              exit 1
            fi
          done

          test -f supabase/migrations/20260711060000_tracker_hardening.sql
          supabase migration list --linked
          supabase db push --dry-run

      - name: Encrypt recovered migrations
        shell: bash
        run: |
          tar -czf "$RUNNER_TEMP/supabase-migrations.tgz" -C supabase migrations
          openssl cms -encrypt -binary -aes-256-cbc \
            -in "$RUNNER_TEMP/supabase-migrations.tgz" \
            -outform DER \
            -out "$RUNNER_TEMP/supabase-migrations.cms" \
            .github/supabase-history-recovery-certificate.pem

      - name: Upload encrypted recovery artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-migration-history
          path: ${{ runner.temp }}/supabase-migrations.cms
          if-no-files-found: error
          retention-days: 1
