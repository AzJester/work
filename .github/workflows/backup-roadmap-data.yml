name: Backup roadmap data

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: hqqwlkmggwgaoiyzgrhy
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check backup credentials
        shell: bash
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN and SUPABASE_DB_PASSWORD are required."
            exit 1
          fi

      - name: Install pinned Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.101.0

      - name: Link production database
        shell: bash
        run: |
          supabase init --force
          supabase link --project-ref "$PROJECT_ID"

      - name: Create read-only logical backup
        shell: bash
        run: |
          backup_dir="$RUNNER_TEMP/roadmap-backup"
          mkdir -p "$backup_dir"

          supabase db dump --linked --file "$backup_dir/schema.sql"
          supabase db dump --linked --data-only --use-copy --file "$backup_dir/data.sql"

          for backup_file in schema.sql data.sql; do
            if [ ! -s "$backup_dir/$backup_file" ]; then
              echo "::error::$backup_file was not created or is empty."
              exit 1
            fi
          done

          sha256sum "$backup_dir/schema.sql" "$backup_dir/data.sql" > "$backup_dir/SHA256SUMS"
          {
            echo "created_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "source_project=$PROJECT_ID"
            echo "source_commit=$GITHUB_SHA"
          } > "$backup_dir/MANIFEST.txt"

      - name: Encrypt backup
        shell: bash
        run: |
          tar -czf "$RUNNER_TEMP/roadmap-backup.tgz" -C "$RUNNER_TEMP/roadmap-backup" .
          openssl cms -encrypt -binary -aes-256-cbc \
            -in "$RUNNER_TEMP/roadmap-backup.tgz" \
            -outform DER \
            -out "$RUNNER_TEMP/roadmap-backup.cms" \
            .github/roadmap-backup-certificate.pem

      - name: Upload encrypted backup
        uses: actions/upload-artifact@v4
        with:
          name: roadmap-supabase-backup
          path: ${{ runner.temp }}/roadmap-backup.cms
          if-no-files-found: error
          retention-days: 1
