name: Deploy to GitHub Pages

# Publishes the repository root (index.html, poster.png, ...) to GitHub Pages
# so the LDAWIF page is reachable at https://<owner>.github.io/<repo>/
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install test dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run source and geometry tests
        run: npm test

      - name: Run browser tests
        run: npm run test:browser

      - name: Upload browser test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

  backend:
    needs: quality
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: hqqwlkmggwgaoiyzgrhy
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect tracker backend changes
        id: backend_changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || ! git rev-parse HEAD^ >/dev/null 2>&1; then
            echo "required=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only HEAD^ HEAD | grep -Eq '^(tracker\.html|dashboard\.html|sw\.js|manifest\.webmanifest|assets/vendor/|supabase/|\.github/workflows/pages\.yml$)'; then
            echo "required=true" >> "$GITHUB_OUTPUT"
          else
            echo "required=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check deployment credentials
        if: steps.backend_changes.outputs.required == 'true'
        shell: bash
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::Configure SUPABASE_ACCESS_TOKEN and SUPABASE_DB_PASSWORD repository secrets before publishing tracker changes."
            exit 1
          fi

      - name: Install pinned Supabase CLI
        if: steps.backend_changes.outputs.required == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: 2.101.0

      - name: Verify required Supabase secrets
        if: steps.backend_changes.outputs.required == 'true'
        shell: bash
        run: |
          names="$(supabase secrets list --project-ref "$PROJECT_ID")"
          printf '%s' "$names" | grep -q 'ANTHROPIC_API_KEY' || {
            echo "::error::Supabase secret ANTHROPIC_API_KEY is missing."
            exit 1
          }
          printf '%s' "$names" | grep -Eq 'AI_ALLOWED_EMAILS|ALLOWED_EMAILS' || {
            echo "::error::Set AI_ALLOWED_EMAILS (or legacy ALLOWED_EMAILS) before deploying fail-closed AI functions."
            exit 1
          }
          printf '%s' "$names" | grep -Eq 'AI_ALLOWED_ORIGINS|ALLOWED_ORIGINS' || {
            echo "::error::Set AI_ALLOWED_ORIGINS=https://azjester.github.io before deploying AI functions."
            exit 1
          }

      - name: Link production database
        if: steps.backend_changes.outputs.required == 'true'
        shell: bash
        run: |
          supabase init --force
          supabase link --project-ref "$PROJECT_ID"

      - name: Verify migration history
        if: steps.backend_changes.outputs.required == 'true'
        shell: bash
        run: |
          history="$(supabase migration list --linked 2>&1)"
          printf '%s\n' "$history"
          remote_only="$(printf '%s\n' "$history" | awk -F '[|]' '
            /^[[:space:]]*[0-9]*[[:space:]]*\|[[:space:]]*[0-9]+[[:space:]]*\|/ {
              local_version = $1
              remote_version = $2
              gsub(/[[:space:]]/, "", local_version)
              gsub(/[[:space:]]/, "", remote_version)
              if (local_version == "" && remote_version != "") print remote_version
            }
          ')"
          if [ -n "$remote_only" ]; then
            echo "::error::Production migrations are missing from Git: $(printf '%s' "$remote_only" | paste -sd, -)"
            exit 1
          fi

      - name: Preview and apply migrations
        if: steps.backend_changes.outputs.required == 'true'
        shell: bash
        run: |
          supabase db push --dry-run
          supabase db push
          supabase migration list --linked

      - name: Deploy bounded AI functions
        if: steps.backend_changes.outputs.required == 'true'
        shell: bash
        run: |
          for function_name in weekly-summary extract-tasks task-actions plan-day build-roadmap roadmap-summary; do
            supabase functions deploy "$function_name" --project-ref "$PROJECT_ID" --no-verify-jwt --use-api
          done

  deploy:
    needs: backend
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        # enablement: true turns Pages on automatically if it isn't already.
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build public site artifact
        shell: bash
        run: |
          mkdir -p _site
          cp -- *.html *.png *.gif *.webmanifest sw.js _site/
          cp -R assets astrion-division LDAWIF geopresence _site/
          touch _site/.nojekyll

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  production-smoke:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install test dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Smoke-test deployed GeoPresence
        env:
          PAGES_URL: "${{ needs.deploy.outputs.page_url }}"
          PRODUCTION_SMOKE: "1"
        run: |
          export PLAYWRIGHT_BASE_URL="${PAGES_URL%/}/geopresence/"
          npm run test:browser:production
