  Paste this into a SharePoint "Embed" web part (or any HTML-capable web part).
  It shows poster.png; clicking it opens the live, animated LDAWIF page in a new tab.

  Both URLs assume GitHub Pages is serving this repo at:
    https://azjester.github.io/work/
  If your Pages URL differs, update the two links below.

  Prefer no code? Use the SharePoint "Image" web part instead: upload poster.png,

-->

   rel="noopener"
   title="LDAWIF — run the live engagement"

       alt="LDAWIF — AI-enabled fire-control. Run the live engagement."
       style="max-width:100%;height:auto;border:0;border-radius:12px;
